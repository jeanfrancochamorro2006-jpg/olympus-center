<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Factory</title>
    <link rel="stylesheet" href="\CSS\EstiloCSS.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">   
    <script src="\SCRIPT\Carrito.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
</head>
<body>
    <!--Cabezera Principal-->
    <header>
        <h1 class="logo-title">OLYMPUS <span>CENTER</span></h1>
        <a href="\PRINCIPAL/index.html">
        <img src="\IMG/LOGO/logo1.png" alt="Olympus Center Logo">
        </a>

        <div class="header-right">
            <span class="header-divider">|</span>
            <span><a href="\PRINCIPAL/login.html" class="account-link">Iniciar Sesion</a></span>
            </div>
        </div>
    
    </header>

    <!-- Contenido principal -->
    <main class="checkout-container">
        <h2>MÉTODO DE PAGO</h2>
        
        <div class="checkout-grid">
            <!-- Resumen del pedido -->
            <div class="order-summary">
                <h3>TU PEDIDO</h3>
                <div id="checkoutItems"></div>
                <div class="order-total">
                    <span>TOTAL:</span>
                    <span id="checkoutTotal">$0.00</span>
                </div>
            </div>
            
            <!-- Formulario de pago -->
            <div class="payment-form">
                <form id="paymentForm">
                    <div class="form-group">
                        <label for="name">Nombre completo</label>
                        <input type="text" id="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="address">Dirección de envío</label>
                        <textarea id="address" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Método de pago</label>
                        <div class="payment-methods">
                            <label class="payment-method">
                                <input type="radio" name="payment" value="tarjeta" checked>
                                <span>Tarjeta de crédito/débito</span>
                            </label>
                            
                            <label class="payment-method">
                                <input type="radio" name="payment" value="paypal">
                                <span>PayPal</span>
                            </label>
                            
                            <label class="payment-method">
                                <input type="radio" name="payment" value="transferencia">
                                <span>Transferencia bancaria</span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- Detalles de tarjeta (visible solo cuando se selecciona tarjeta) -->
                    <div id="cardDetails" class="card-details">
                        <div class="form-group">
                            <label for="cardNumber">Número de tarjeta</label>
                            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456">
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry">Fecha de expiración</label>
                                <input type="text" id="expiry" placeholder="MM/AA">
                            </div>
                            
                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" placeholder="123">
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn">CONFIRMAR PAGO</button>
                </form>
            </div>
        </div>
    </main>


</body>
</html>
